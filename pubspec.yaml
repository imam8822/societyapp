name: society_app
description: Society Savings & Loan Management App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^13.2.0

  # HTTP
  dio: ^5.4.3+1

  # Secure storage (JWT token)
  flutter_secure_storage: ^9.0.0

  # Image picker (screenshot upload)
  image_picker: ^1.1.2

  # UPI deep link
  url_launcher: ^6.2.6

  # UI helpers
  intl: ^0.19.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  google_fonts: ^8.1.0
  firebase_core: ^4.11.0
  firebase_messaging: ^16.4.1
  fl_chart: ^1.2.0
  path_provider: ^2.1.6
  share_plus: ^12.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
